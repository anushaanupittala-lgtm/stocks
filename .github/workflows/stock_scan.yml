name: AI Stock Scanner

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    # Monday-Friday
    # 4:00 PM IST (10:30 UTC)
    - cron: "30 10 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest

    # IMPORTANT: This must match your Environment name
    environment: stocks

    permissions:
      contents: read

    env:
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Environment
        run: |
          python --version
          pip list
          echo "EMAIL_ADDRESS exists: ${{ secrets.EMAIL_ADDRESS != '' }}"
          echo "EMAIL_RECEIVER exists: ${{ secrets.EMAIL_RECEIVER != '' }}"

      - name: Run Stock Scanner
        run: |
          python app.py

      - name: List Output
        if: always()
        run: |
          ls -la
          ls -la output || true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-report
          path: output/
